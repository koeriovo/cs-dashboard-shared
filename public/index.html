<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CS Weekly ダッシュボード</title>
<style>
:root { color-scheme: light; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f7f7f5; color: #1a1a18; font-size: 14px; line-height: 1.5; }

.header { background: #fff; border-bottom: 0.5px solid #e4e4e0; padding: 12px 18px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 10; }
.header-title { font-size: 14px; font-weight: 600; }
.header-sub { font-size: 11px; color: #999; margin-top: 1px; }
.header-actions { display: flex; gap: 8px; align-items: center; }
.cs-select { font-size: 12px; font-family: inherit; border: 0.5px solid #d8d8d4; border-radius: 6px; padding: 4px 8px; background: #fff; cursor: pointer; color: #444; }
.reload-btn { font-size: 12px; color: #555; background: #fff; border: 0.5px solid #d8d8d4; border-radius: 6px; padding: 5px 11px; cursor: pointer; display: flex; align-items: center; gap: 5px; }
.reload-btn:hover { background: #f4f4f0; }

.stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; padding: 14px 18px 4px; }

.stat-lbl { font-size: 10px; color: #999; margin-top: 1px; }

.progress-wrap { padding: 8px 18px 4px; }
.progress-bar { height: 3px; background: #e8e8e4; border-radius: 99px; overflow: hidden; }
.progress-fill { height: 100%; background: #2a7a50; border-radius: 99px; transition: width 0.35s; }

.focus-section { margin: 12px 18px 0; }
.focus-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; color: #aaa; margin-bottom: 7px; }
.focus-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
.focus-panel { background: #fff; border: 0.5px solid #e4e4e0; border-radius: 10px; padding: 10px 12px; min-height: 80px; }
.focus-panel-title { font-size: 11px; font-weight: 600; color: #555; margin-bottom: 7px; }
.focus-item { font-size: 11px; color: #333; padding: 3px 0; border-bottom: 0.5px solid #f0f0ec; display: flex; align-items: baseline; justify-content: space-between; gap: 6px; }
.focus-item:last-child { border-bottom: none; }
.focus-item-name { font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; min-width: 0; }

.focus-badge-red { color: #993030; font-weight: 600; }
.focus-badge-orange { color: #8a4f0a; font-weight: 600; }
.focus-badge-blue { color: #1a5fa5; }
.focus-badge-green { color: #2a7a50; }
.focus-empty { font-size: 11px; color: #bbb; padding: 4px 0; }

.cj-section { margin: 10px 18px 0; }
.cj-timeline { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; }
.cj-phase { background: #fff; border: 0.5px solid #e4e4e0; border-radius: 8px; padding: 8px 9px; }
.cj-phase-hdr { display: flex; flex-direction: column; margin-bottom: 5px; }
.cj-phase-name { font-size: 10px; font-weight: 600; color: #555; }
.cj-phase-task { font-size: 9px; color: #aaa; margin-top: 1px; }
.cj-count { font-size: 16px; font-weight: 500; color: #333; }
.cj-companies { margin-top: 4px; }
.cj-company { font-size: 10px; color: #666; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.6; }
.cj-phase.active { border-color: #a8c8f0; background: #f4f9ff; }
.cj-phase.active .cj-phase-name { color: #1a5fa5; }
.cj-phase.active .cj-count { color: #1a5fa5; }

.pinned-section { margin: 10px 18px 0; }
.pinned-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
.pinned-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; color: #e8930a; display: flex; align-items: center; gap: 5px; }
.add-pin-btn { font-size: 11px; color: #999; background: none; border: 0.5px solid #d8d8d4; border-radius: 5px; padding: 2px 8px; cursor: pointer; }
.add-pin-btn:hover { background: #f4f4f0; }
.pin-card { background: #fffcf0; border: 0.5px solid #f0d890; border-left: 3px solid #e8930a; border-radius: 8px; padding: 9px 12px; margin-bottom: 5px; display: flex; align-items: flex-start; gap: 9px; }
.pin-chk { width: 18px; height: 18px; border-radius: 50%; border: 1.5px solid #d8c060; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; cursor: pointer; background: #fff; transition: all 0.15s; }
.pin-chk.on { background: #2a7a50; border-color: #2a7a50; }
.pin-body { flex: 1; min-width: 0; }
.pin-company { font-size: 11px; font-weight: 600; color: #8a4f0a; margin-bottom: 2px; }
.pin-text { font-size: 12px; color: #333; line-height: 1.45; }
.pin-date { font-size: 10px; color: #bbb; margin-top: 2px; }
.pin-del { font-size: 16px; color: #d0c090; cursor: pointer; padding: 0 2px; flex-shrink: 0; }
.pin-del:hover { color: #c05040; }
.pin-add-form { background: #fff; border: 0.5px solid #d8d8d4; border-radius: 8px; padding: 10px 12px; margin-bottom: 5px; }
.pin-form-row { display: flex; gap: 6px; margin-bottom: 6px; }
.pin-form-input { flex: 1; font-size: 12px; font-family: inherit; border: 0.5px solid #d0d0cc; border-radius: 5px; padding: 5px 8px; outline: none; background: #f9f9f7; }

.pin-form-textarea { width: 100%; font-size: 12px; font-family: inherit; border: 0.5px solid #d0d0cc; border-radius: 5px; padding: 5px 8px; outline: none; background: #f9f9f7; resize: none; }

.section { padding: 0 18px 20px; }
.section-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.07em; color: #aaa; margin: 14px 0 6px; }

.card { background: #fff; border: 0.5px solid #e4e4e0; border-radius: 10px; padding: 11px 13px; margin-bottom: 6px; display: flex; align-items: flex-start; gap: 11px; cursor: pointer; transition: opacity 0.18s, border-color 0.15s; }
.card:hover { border-color: #ccc; }
.card.done { opacity: 0.38; }
.card.done .card-name { text-decoration: line-through; color: #aaa; }
.card[data-urgency="high"] { border-left: 3px solid #d94040; }
.card[data-urgency="waiting"] { border-left: 3px solid #e8930a; }

.chk { width: 20px; height: 20px; border-radius: 50%; border: 1.5px solid #d0d0cc; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 2px; transition: all 0.15s; background: #fff; }
.chk.on { background: #2a7a50; border-color: #2a7a50; }
.chk svg { opacity: 0; transition: opacity 0.12s; }
.chk.on svg { opacity: 1; }

.card-body { flex: 1; min-width: 0; }
.card-name { font-size: 13px; font-weight: 500; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; user-select: none; }
.tags { display: flex; flex-wrap: wrap; gap: 4px; user-select: none; }
.tag { font-size: 10px; font-weight: 500; padding: 2px 7px; border-radius: 4px; }
.tag-red { background: #fce8e8; color: #993030; }
.tag-orange { background: #fff0e0; color: #8a4f0a; }
.tag-blue { background: #e4f0fb; color: #1a5fa5; }
.tag-green { background: #e6f5ee; color: #2a7a50; }

.unpub-info { margin-top: 6px; background: #fff8f0; border: 0.5px solid #f0d4a0; border-left: 3px solid #e8930a; border-radius: 6px; padding: 6px 9px; user-select: none; }
.unpub-info-high { background: #fff2f2; border-color: #f0b0b0; border-left-color: #d94040; }
.unpub-title { font-size: 10px; font-weight: 600; color: #8a4f0a; margin-bottom: 3px; }

.unpub-site { font-size: 11px; color: #555; display: flex; gap: 5px; align-items: baseline; margin-top: 2px; flex-wrap: wrap; }
.unpub-site-name { font-weight: 500; }
.unpub-memo { color: #888; font-style: italic; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; max-width: 160px; }

.unpub-publish { font-size: 10px; font-weight: 600; white-space: nowrap; }
.unpub-publish-urgent { color: #993030; }
.unpub-publish-soon { color: #8a4f0a; }
.unpub-publish-ok { color: #2a7a50; }

.ai-insight { margin-top: 8px; background: #fafafa; border: 0.5px solid #e8e8e4; border-radius: 7px; padding: 7px 10px; user-select: none; }
.ai-insight-top { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; flex-wrap: wrap; }
.status-badge { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 4px; white-space: nowrap; }
.status-red { background: #fce8e8; color: #993030; }
.status-orange { background: #fff0e0; color: #8a4f0a; }
.status-blue { background: #e4f0fb; color: #1a5fa5; }
.status-green { background: #e6f5ee; color: #2a7a50; }
.status-gray { background: #f0f0ec; color: #666; }
.ai-reason { font-size: 10px; color: #aaa; }
.ai-next-action { font-size: 12px; color: #222; font-weight: 500; }
.ai-done-btn { margin-top: 6px; font-size: 11px; color: #2a7a50; background: #e6f5ee; border: none; border-radius: 5px; padding: 3px 10px; cursor: pointer; }
.ai-analyzing { margin-top: 8px; font-size: 11px; color: #bbb; display: flex; align-items: center; gap: 5px; user-select: none; }
.spinner-sm { width: 10px; height: 10px; border: 1.5px solid #e0e0e0; border-top-color: #aaa; border-radius: 50%; animation: spin 0.6s linear infinite; flex-shrink: 0; }

.memo-row { margin-top: 7px; }
.memo-row-btns { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.memo-toggle { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; color: #bbb; cursor: pointer; user-select: none; }
.memo-toggle:hover { color: #888; }
.memo-toggle.has-content { color: #6644aa; }
.memo-preview-text { font-style: italic; max-width: 180px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; display: inline-block; vertical-align: bottom; }
.slack-fetch-link { display: inline-flex; align-items: center; gap: 3px; font-size: 11px; color: #4a9edd; cursor: pointer; user-select: none; }
.slack-fetch-link:hover { color: #1a5fa5; }
.slack-input-wrap { margin-top: 6px; display: flex; gap: 5px; align-items: center; }
.slack-url-field { flex: 1; font-size: 12px; font-family: inherit; border: 0.5px solid #a8c8f0; border-radius: 5px; padding: 5px 8px; outline: none; background: #f0f7ff; color: #333; }
.slack-url-field:focus { border-color: #4a9edd; background: #fff; }
.slack-fetch-btn-go { font-size: 11px; background: #4a9edd; color: #fff; border: none; border-radius: 5px; padding: 4px 10px; cursor: pointer; white-space: nowrap; }
.slack-fetch-btn-go:hover { background: #2a7abf; }
.slack-fetch-btn-go:disabled { background: #aaa; cursor: default; }
.slack-cancel-btn { font-size: 12px; color: #bbb; background: none; border: none; cursor: pointer; padding: 2px; }
.slack-fetch-status { font-size: 11px; color: #888; margin-top: 4px; display: flex; align-items: center; gap: 5px; }
.memo-input {
  display: none; width: 100%; margin-top: 6px; padding: 7px 9px;
  font-size: 12px; font-family: inherit; color: #333;
  background: #f9f7ff; border: 0.5px solid #c8b8f0; border-radius: 6px;
  resize: none; line-height: 1.5; outline: none;
  cursor: text; user-select: text; -webkit-user-select: text;
}
.memo-input:focus { border-color: #9977dd; background: #fff; }
.notion-link { font-size: 11px; color: #ccc; text-decoration: none; padding-left: 8px; flex-shrink: 0; margin-top: 3px; }
.notion-link:hover { color: #888; }

.loading { display: flex; align-items: center; justify-content: center; padding: 60px 20px; color: #aaa; font-size: 13px; gap: 8px; flex-direction: column; }
.loading-sub { font-size: 11px; color: #ccc; }
.spinner { width: 16px; height: 16px; border: 2px solid #e0e0e0; border-top-color: #888; border-radius: 50%; animation: spin 0.6s linear infinite; flex-shrink: 0; }
@keyframes spin { to { transform: rotate(360deg); } }
.empty { text-align: center; padding: 48px 20px; color: #aaa; font-size: 13px; }
.error-box { margin: 16px 18px; padding: 12px 14px; background: #fce8e8; border-radius: 8px; color: #993030; font-size: 12px; }
</style>

<body>

<div class="header">
  <div>
    <div class="header-title">CS Weekly ダッシュボード</div>
    <div class="header-sub" id="hdr-sub">読み込み中...</div>
  </div>
  <div class="header-actions">
    <select class="cs-select" id="cs-select" onchange="reload()">
      <option value="">👥 全員</option>
      <option value="3a0983f0-8dc8-4ac6-af37-7d4d5601503b">Erika</option>
      <!-- 他のCSメンバーはここに追加 (Notion User ID が必要) -->
    </select>
    <button class="reload-btn" onclick="reload()">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>
      更新
    </button>
  </div>
</div>

<div id="app">
  <div class="loading"><div class="spinner"></div>読み込み中...<div class="loading-sub">Notion × 3DB を取得中</div></div>
</div>

<script>
// ─────────────────────────────────────────
// 設定
// ─────────────────────────────────────────
const CUSTOMERS_VIEW = 'https://www.notion.so/studiodesign/210e8887325180a6b810f5f4d982a9f0?v=210e8887325180829155000cdcd78fae';
const UNPUB_VIEW     = 'https://www.notion.so/studiodesign/234e8887325180499a36e347ea4347a2?v=349e888732518073b73b000cab302cff';
const CJ_VIEW        = 'https://www.notion.so/studiodesign/318e8887325180c7b4b2e2b832623a52?v=31fe88873251800db057000c63d2f02b';
const TODAY = new Date().toISOString().slice(0, 10);

// ─────────────────────────────────────────
// API ラッパー (Cowork → サーバーレス関数)
// ─────────────────────────────────────────
async function apiNotion(args) {
  const r = await fetch('/api/notion', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(args),
  });
  const data = await r.json();
  if (!r.ok) throw new Error('Notion error: ' + (data.error || r.statusText));
  return { structuredContent: data, isError: false };
}

async function apiSlack(toolSuffix, args) {
  const action = toolSuffix.includes('thread') ? 'read_thread' : 'read_channel';
  const r = await fetch('/api/slack', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ action, ...args }),
  });
  const data = await r.json();
  if (!r.ok) throw new Error('Slack error: ' + (data.error || r.statusText));
  return { structuredContent: data, isError: false };
}

async function askClaude(prompt, data) {
  const r = await fetch('/api/ai', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ prompt, data }),
  });
  const result = await r.json();
  if (!r.ok) throw new Error('AI error: ' + (result.error || r.statusText));
  return result.text || '';
}

// ─────────────────────────────────────────
// Storage
// ─────────────────────────────────────────
function loadChecked()  { try { const s=JSON.parse(localStorage.getItem('cs-checked')||'{}'); return s.date===TODAY?(s.ids||{}):{};} catch{return{};} }
function saveChecked()  { localStorage.setItem('cs-checked', JSON.stringify({date:TODAY, ids:checked})); }
function loadMemos()    { try { return JSON.parse(localStorage.getItem('cs-memos')||'{}'); } catch{return{};} }
function saveMemo(id,v) { if(v) memos[id]=v; else delete memos[id]; localStorage.setItem('cs-memos',JSON.stringify(memos)); }
function loadInsights() { try { return JSON.parse(localStorage.getItem('cs-insights')||'{}'); } catch{return{};} }
function saveInsights() { localStorage.setItem('cs-insights', JSON.stringify(insights)); }
function loadPins()     { try { return JSON.parse(localStorage.getItem('cs-pins')||'[]'); } catch{return[];} }
function savePins()     { localStorage.setItem('cs-pins', JSON.stringify(pins)); }

let checked  = loadChecked();
let memos    = loadMemos();
let insights = loadInsights();
let pins     = loadPins();
let allCards = [];
let unpublishedMap = {};
let cjMap    = {};
let memoTimers = {};

// ─────────────────────────────────────────
// Utils
// ─────────────────────────────────────────
function parseArr(val) { if(!val||val==='<omitted />') return []; try{return JSON.parse(val);}catch{return[val];} }
function daysSince(str) { if(!str) return null; return Math.floor((Date.now()-new Date(str))/86400000); }
function daysUntil(str) { if(!str) return null; return Math.floor((new Date(str)-Date.now())/86400000); }
function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function extractPageId(url) {
  if(!url) return null;
  const m=url.match(/\/p\/([0-9a-f]{32})/i)||url.match(/\/([0-9a-f]{32})(?:[^0-9a-f]|$)/i);
  return m?m[1].toLowerCase():null;
}

// ─────────────────────────────────────────
// CJ Phase
// ─────────────────────────────────────────
const CJ_PHASES = [
  {n:1, label:'1ヶ月',    task:null,          maxDays:30,  color:'blue'},
  {n:2, label:'2ヶ月',    task:null,          maxDays:60,  color:'blue'},
  {n:3, label:'3ヶ月',    task:'CSAT実施',     maxDays:90,  color:'green'},
  {n:4, label:'4–6ヶ月', task:'miniBR/NPS',  maxDays:180, color:'orange'},
  {n:5, label:'6–12ヶ月',task:'NPS/BR',       maxDays:365, color:'orange'},
];
function getCJPhase(contractDate) {
  if(!contractDate) return null;
  const d=daysSince(contractDate);
  if(d===null||d<0) return null;
  for(const p of CJ_PHASES) { if(d<=p.maxDays) return {...p,days:d}; }
  return null;
}

function priority(c) {
  const ins=insights[c.url];
  if(ins&&ins.urgency==='high') return -1;
  const stage=parseArr(c['Stage']).join('|');
  if(stage.includes('Risk / At Risk')) return 0;
  const pid=extractPageId(c.url);
  const unpub=pid?unpublishedMap[pid]:null;
  if(unpub&&unpub.some(s=>s.isHighRisk)) return 0;
  const days=daysSince(c['date:最終会話日:start']);
  const created=daysSince(c['作成日時']);
  if(stage.includes('オンボーディング期間')&&(created!==null&&created<=90)&&(days===null||days>7)) return 1;
  if(unpub&&unpub.length>0) return 2;
  if(days===null||days>30) return 2;
  return 3;
}

// ─────────────────────────────────────────
// Data loading
// ─────────────────────────────────────────
async function loadUnpublishedSites() {
  const map={};
  let cursor=null, total=0;
  try {
    do {
      const args={view_url:UNPUB_VIEW, page_size:100};
      if(cursor) args.start_cursor=cursor;
      const r=await apiNotion(args);
      if(r.isError) break;
      const data=r.structuredContent;
      for(const site of (data.results||[])) {
        const companyUrls=parseArr(site['企業名']||'');
        for(const cu of companyUrls) {
          const pid=extractPageId(cu);
          if(!pid) continue;
          if(!map[pid]) map[pid]=[];
          const publishDate=site['date:公開予定日:start']||'';
          map[pid].push({
            siteName:     site['name']||'（名称不明）',
            memo:         site['memo']||'',
            createdAt:    site['date:created_at:start']||'',
            publishDate,
            isHighRisk:   site['Risk']==='__YES__',
            daysSinceCreated: daysSince(site['date:created_at:start']),
            daysUntilPublish: publishDate?daysUntil(publishDate):null,
          });
        }
        total++;
      }
      cursor=data.has_more?data.next_cursor:null;
    } while(cursor&&total<500);
  } catch(e){console.warn('未公開DB取得エラー:',e);}
  return map;
}

async function loadCJTasks() {
  const map={};
  let cursor=null, total=0;
  try {
    do {
      const args={view_url:CJ_VIEW, page_size:100};
      if(cursor) args.start_cursor=cursor;
      const r=await apiNotion(args);
      if(r.isError) break;
      const data=r.structuredContent;
      for(const row of (data.results||[])) {
        const custUrls=parseArr(row['Enterprise Customers']||'');
        const contractDate=row['date:日付:start']||'';
        for(const cu of custUrls) {
          const pid=extractPageId(cu);
          if(pid) map[pid]={contractDate, progress:row['進捗']||''};
        }
        total++;
      }
      cursor=data.has_more?data.next_cursor:null;
    } while(cursor&&total<500);
  } catch(e){console.warn('CJタスクDB取得エラー:',e);}
  return map;
}

function parseSlackUrl(url) {
  const match=url.trim().match(/archives\/(C[A-Z0-9]+)(?:\/p(\d+))?/);
  if(!match) return null;
  const channelId=match[1];
  if(match[2]){
    const digits=match[2];
    const ts=digits.slice(0,10)+'.'+(digits.slice(10)||'000000').padEnd(6,'0');
    return {channelId,messageTs:ts,isThread:true};
  }
  return {channelId,isThread:false};
}

async function fetchAndFillSlack(eid, slackUrl) {
  const id=decodeURIComponent(eid);
  const parsed=parseSlackUrl(slackUrl);
  if(!parsed) throw new Error('Slack URLの形式が正しくありません');
  let rawData;
  if(parsed.isThread){
    const r=await apiSlack('slack_read_thread',{channel_id:parsed.channelId,message_ts:parsed.messageTs,limit:50});
    if(r.isError) throw new Error('Slackスレッドの読み込みに失敗しました');
    rawData=r.structuredContent;
  } else {
    const r=await apiSlack('slack_read_channel',{channel_id:parsed.channelId,limit:25});
    if(r.isError) throw new Error('Slackチャンネルの読み込みに失敗しました');
    rawData=r.structuredContent;
  }
  const messages=Array.isArray(rawData)?rawData:(rawData.messages||rawData.replies||rawData);
  const memoText=await askClaude(
    `以下はSlackの会話履歴です。CSとして重要な情報を抽出し、簡潔なメモを作成してください（4〜6行）。形式：日付付き箇条書き。含める内容：最終接触日と内容、未回答の依頼・質問（★マーク）、現状、次のアクション。余分な説明不要。`,
    messages
  );
  const memoStr=typeof memoText==='string'?memoText.trim():JSON.stringify(memoText);
  saveMemo(id,memoStr);
  const ta=document.querySelector(`textarea[data-memo-id="${eid}"]`);
  if(ta){ta.value=memoStr; ta.style.display='block';}
  const toggle=document.querySelector(`[data-memo-toggle="${eid}"]`);
  if(toggle){toggle.className='memo-toggle has-content'; toggle.innerHTML=`${pencilSvg}<span class="memo-preview-text">${escHtml(memoStr)}</span>`;}
  if(insights[id]){delete insights[id]; saveInsights();}
  const slot=document.querySelector(`[data-insight-slot="${eid}"]`);
  if(slot) slot.outerHTML=insightHtml(id,true);
  setTimeout(()=>analyzeMemos(allCards),300);
}

async function doSlackFetch(eid){
  const wrap=document.querySelector(`[data-slack-wrap="${eid}"]`);
  const field=wrap?.querySelector('.slack-url-field');
  const btn=wrap?.querySelector('.slack-fetch-btn-go');
  if(!field?.value||!btn) return;
  btn.textContent='読み込み中...'; btn.disabled=true;
  let statusEl=wrap.parentElement?.querySelector('.slack-fetch-status');
  if(!statusEl){statusEl=document.createElement('div'); statusEl.className='slack-fetch-status'; wrap.parentElement.appendChild(statusEl);}
  statusEl.innerHTML=`<div class="spinner-sm"></div>Slackを読み込んでメモを生成中...`;
  try {
    await fetchAndFillSlack(eid,field.value);
    statusEl.innerHTML=`<span style="color:#2a7a50">✓ メモを自動入力しました</span>`;
    wrap.style.display='none'; btn.textContent='取得'; btn.disabled=false;
    setTimeout(()=>statusEl.remove(),3000);
  } catch(e){
    statusEl.innerHTML=`<span style="color:#993030">⚠ ${escHtml(e.message)}</span>`;
    btn.textContent='取得'; btn.disabled=false;
  }
}

function insightHtml(id,hasMemo){

async function analyzeMemos(customers){
  const withMemos=customers.filter(c=>{const m=memos[c.url]; if(!m) return false; const ca=insights[c.url]; return !(ca&&ca.analyzedMemo===m);});
  if(!withMemos.length) return;
  const memoData=withMemos.map(c=>({id:c.url,name:c['顧客名']||'不明',stage:parseArr(c['Stage']).join(', '),memo:memos[c.url]}));
  try {
    const result=await askClaude(
      `CSメモを読み、各顧客の状況と次のアクションを判断。JSONのみ返す：[{"id":"URL","status":"要対応|返信待ち|進行中|完了|様子見","statusColor":"red|orange|blue|green|gray","urgency":"high|waiting|active|done|low","nextAction":"25字以内","reason":"15字以内"}]
基準: 要対応(red,high)=未回答依頼あり / 返信待ち(orange,waiting)=送信済み待ち / 進行中(blue,active)=作業進行中 / 完了(green,done)=タスク完了 / 様子見(gray,low)=緊急なし`,
      memoData
    );
    let parsed=[];
    try{const t=typeof result==='string'?result:JSON.stringify(result); const m=t.match(/\[[\s\S]*\]/); if(m) parsed=JSON.parse(m[0]);}catch{}
    parsed.forEach(item=>{if(item.id) insights[item.id]={...item,analyzedMemo:memos[item.id]};});
    saveInsights();
    parsed.forEach(item=>{
      if(!item.id) return;
      const eid=encodeURIComponent(item.id);
      const card=document.querySelector(`.card[data-id="${eid}"]`);
      if(!card) return;
      card.dataset.urgency=item.urgency||'low';
      const slot=card.querySelector('[data-insight-slot]');
      if(slot) slot.outerHTML=insightHtml(item.id,true);
    });
  } catch(e){console.error('AI分析エラー:',e);}
}

  const title=hasHighRisk?'⚠️ 未公開サイトあり（要対応）':'⏳ 未公開サイトあり';
  const cls=hasHighRisk?'unpub-info unpub-info-high':'unpub-info';
  const titleCls=hasHighRisk?'unpub-title high':'unpub-title';
  const sitesHtml=sites.slice(0,3).map(s=>{
    const dStr=s.daysSinceCreated!==null?`${s.daysSinceCreated}日経過`:'';

// Render
// ─────────────────────────────────────────
function render(customers){
  const app=document.getElementById('app');
  if(!customers.length){app.innerHTML='<div class="empty">担当顧客が見つかりませんでした</div>'; return;}

  allCards=[...customers].sort((a,b)=>priority(a)-priority(b));
  const secs=[
    {label:'🔴 要対応（メモより）',items:[]},
    {label:'⚠️ 要注意（At Risk / 未公開リスク）',items:[]},
    {label:'🆕 新規オンボーディング（90日以内）',items:[]},
    {label:'📆 長期未接触・未公開（30日以上）',items:[]},
    {label:'通常フォロー',items:[]},
  ];
  allCards.forEach(c=>{const p=priority(c); secs[p===-1?0:p===0?1:p===1?2:p===2?3:4].items.push(c);});

  const total=customers.length;
  const atRisk=secs[1].items.length;
  const doneCount=allCards.filter(c=>!!checked[c.url]).length;
  const unpubCount=customers.filter(c=>{const pid=extractPageId(c.url); return pid&&unpublishedMap[pid];}).length;

  const csLabel=document.getElementById('cs-select')?.selectedOptions[0]?.text||'';
  document.getElementById('hdr-sub').textContent=TODAY+(csLabel&&csLabel!=='👥 全員'?` · ${csLabel}`:``)+ ` · ${total}社担当`;

  let html=`
    <div class="stats">
      <div class="stat"><div class="stat-num">${total}</div><div class="stat-lbl">担当社数</div></div>
      <div class="stat"><div class="stat-num" style="color:#993030">${atRisk}</div><div class="stat-lbl">At Risk</div></div>
      <div class="stat"><div class="stat-num" style="color:#e8930a">${unpubCount}</div><div class="stat-lbl">未公開あり</div></div>
      <div class="stat"><div class="stat-num" style="color:#2a7a50" id="stat-done">${doneCount}</div><div class="stat-lbl">完了</div></div>
    </div>
    <div class="progress-wrap"><div class="progress-bar"><div class="progress-fill" style="width:${total?Math.round(doneCount/total*100):0}%"></div></div></div>
    ${buildWeeklyFocus(customers)}
    ${buildCJTimeline(customers)}
    <div class="pinned-section" id="pinned-section" style="${pins.length?'':'display:none'}">
      <div class="pinned-header">
        <span class="pinned-label">📌 ピン留めタスク${pins.filter(p=>!p.done).length>0?' · '+pins.filter(p=>!p.done).length+'件':''}</span>
        <button class="add-pin-btn" id="add-pin-btn" onclick="showAddPinForm()">+ 追加</button>
      </div>
      <div id="pinned-container"></div>
    </div>
    <div style="padding:4px 18px 0" id="pin-add-btn-wrap">
      <button class="add-pin-btn" onclick="showPinnedFromBtn()" style="color:#e8930a;border-color:#f0d890;margin-top:8px">📌 タスクをピン留め</button>
    </div>
    <div class="section">`;

  secs.forEach(s=>{
    if(!s.items.length) return;
    html+=`<div class="section-label">${s.label}</div>`;
    s.items.forEach(c=>{html+=buildCard(c);});
  });
  html+='</div>';
  app.innerHTML=html;
  renderPins();
  if(pins.length){document.getElementById('pinned-section').style.display=''; document.getElementById('pin-add-btn-wrap').style.display='none';}

  app.addEventListener('click',e=>{
    const toggle=e.target.closest('[data-memo-toggle]');
    if(toggle){const eid=toggle.dataset.memoToggle; const ta=app.querySelector(`textarea[data-memo-id="${eid}"]`); if(ta){const o=ta.style.display==='block'; ta.style.display=o?'none':'block'; if(!o) setTimeout(()=>{ta.focus(); ta.setSelectionRange(ta.value.length,ta.value.length);},10);} return;}
    if(e.target.closest('.memo-row')) return;
    if(e.target.closest('.ai-insight')) return;
    if(e.target.closest('.unpub-info')) return;
    if(e.target.closest('.notion-link')) return;
    if(e.target.closest('.pinned-section')) return;
    if(e.target.closest('#pin-add-btn-wrap')) return;
    if(e.target.closest('.focus-section')) return;
    if(e.target.closest('.cj-section')) return;
    const card=e.target.closest('.card');
    if(!card) return;
    const id=decodeURIComponent(card.dataset.id);
    checked[id]=!checked[id]; saveChecked();
    card.classList.toggle('done',!!checked[id]);
    card.querySelector('.chk').classList.toggle('on',!!checked[id]);
    updateStats();
  });

  app.addEventListener('input',e=>{
    const ta=e.target.closest('textarea[data-memo-id]');
    if(!ta) return;
    const eid=ta.dataset.memoId; const id=decodeURIComponent(eid);
    clearTimeout(memoTimers[eid]);
    memoTimers[eid]=setTimeout(()=>{
      saveMemo(id,ta.value);
      const toggle=app.querySelector(`[data-memo-toggle="${eid}"]`);
      if(toggle){if(ta.value){toggle.className='memo-toggle has-content'; toggle.innerHTML=`${pencilSvg}<span class="memo-preview-text">${escHtml(ta.value)}</span>`;}else{toggle.className='memo-toggle'; toggle.innerHTML=`${pencilSvg}<span>メモ</span>`;}}
      if(insights[id]){delete insights[id]; saveInsights();}
      const slot=app.querySelector(`[data-insight-slot="${encodeURIComponent(id)}"]`);
      if(slot&&ta.value) slot.outerHTML=insightHtml(id,true);
      clearTimeout(memoTimers[eid+'_a']);
      memoTimers[eid+'_a']=setTimeout(()=>analyzeMemos(allCards),1500);
    },600);
  });

  analyzeMemos(customers);
}

function showPinnedFromBtn(){const s=document.getElementById('pinned-section'); if(s) s.style.display=''; const w=document.getElementById('pin-add-btn-wrap'); if(w) w.style.display='none'; showAddPinForm();}

// ─────────────────────────────────────────
// Load
// ─────────────────────────────────────────
async function load(){
  document.getElementById('app').innerHTML='<div class="loading"><div class="spinner"></div>読み込み中...<div class="loading-sub">Notion × 3DB を取得中</div></div>';
  const filterCsId=document.getElementById('cs-select')?.value||'';
  try {
    const [customersData, unpubData, cjData]=await Promise.all([
      (async()=>{
        let results=[],cursor=null;
        do {
          const args={view_url:CUSTOMERS_VIEW,page_size:100};
          if(cursor) args.start_cursor=cursor;
          const r=await apiNotion(args);
          if(r.isError) throw new Error('Notion APIエラー（顧客DB）');
          const data=r.structuredContent;
          results=results.concat(data.results||[]);
          cursor=data.has_more?data.next_cursor:null;
        } while(cursor);
        return results;
      })(),
      loadUnpublishedSites(),
      loadCJTasks(),
    ]);

    unpublishedMap=unpubData;

    // CSフィルター
    const mine=filterCsId
      ?customersData.filter(c=>(c['担当CS']||'').includes(filterCsId))
      :customersData;

    // CJマップ絞り込み
    const myIds=new Set(mine.map(c=>extractPageId(c.url)).filter(Boolean));
    cjMap={};
    for(const [pid,data] of Object.entries(cjData)){
      if(myIds.has(pid)) cjMap[pid]=data;
    }

    render(mine);
  } catch(e){
    document.getElementById('app').innerHTML=`<div class="error-box">読み込みエラー: ${escHtml(e.message)}</div>`;
  }
}

function reload(){checked=loadChecked(); memos=loadMemos(); insights=loadInsights(); pins=loadPins(); unpublishedMap={}; cjMap={}; load();}
load();
</script>
</body>
</html>
